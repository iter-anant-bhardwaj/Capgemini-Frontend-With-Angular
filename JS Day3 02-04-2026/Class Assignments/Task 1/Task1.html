<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    /* flex-wrap: wrap; */
    background-color: #4b79a1;
    padding: 10px 20px;
    color: white;
}

.left {
    display: flex;
    align-items: center;
    gap: 20px;
}

.logo {
    background-image: url("google.png");
    width: 40px;
    height: 40px;
    background-size: contain;
    background-repeat: no-repeat;
}

.links {
    display: flex;
    gap: 15px;
}

.links a {
    color: white;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}

.search {
    display: flex;
    align-items: center;
    gap: 5px;
}

.search input {
    padding: 5px;
    border-radius: 5px;
    border: none;
}

.right {
    display: flex;
    align-items: center;
}

.logout {
    display: flex;
    align-items: center;
    gap: 5px;
    background-color: #ff6b6b;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
}

.left, .search, .right {
    margin: 5px 0;
}

i {
    color: white;
}

@media screen and (max-width:700px) {
    .search input{
        width: 50px;
    }
}

@media screen and (max-width:350px) {
    .search{
        display: none;
    }
}

</style>
</head>

<body>

<div class="navbar">

    <div class="left">
        <div class="logo"></div>

        <div class="links">
            <a href="#"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#"><i class="fa-solid fa-phone"></i> Contact</a>
        </div>
    </div>

    <div class="search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
    </div>

    <div class="right">
        <div class="logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </div>
    </div>

</div>

</body>
</html>
