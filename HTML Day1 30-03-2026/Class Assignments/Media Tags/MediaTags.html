<!DOCTYPE html>
<html lang="en">
<head>
    <title>Media Tags Example</title>
</head>
<body>

    <h2>Image Tag</h2>
    <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" width="300">

    <h2>Audio Tag</h2>
    <audio controls>
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
    </audio>

    <h2>Video Tag</h2>
    <video width="400" controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <h2>Iframe Tag (YouTube Video)</h2>
    <iframe width="400" height="250"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ">
    </iframe>

    <h2>Figure and Figcaption</h2>
    <figure>
        <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131" width="200">
        <figcaption>This is a caption for the image</figcaption>
    </figure>

</body>
</html>
