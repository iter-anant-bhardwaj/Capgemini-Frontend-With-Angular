<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>

        <fieldset>
            <legend>Registration Form</legend>
            <label for="name">Name:</label>
        <input type="text" id="name"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email"><br><br>

        <label for="number">Number:</label>
        <input type="number" id="number"><br><br>

        <label for="date">Date:</label>
        <input type="date" id="date"><br><br>

        <label for="time">Time:</label>
        <input type="time" id="time"><br><br>

        <label for="color">Color:</label>
        <input type="color" id="color"><br><br>

        <label for="file">File:</label>
        <input type="file" id="file"><br><br>

        <label>Gender:</label>
        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>
        <br><br>

        <label for="course">Course:</label>
        <select id="course">
            <option>B.Tech</option>
            <option>BCA</option>
            <option>MCA</option>
        </select><br><br>

        <label for="vehicle">Select Brand:</label>

        <select id="vehicle" name="vehicle">

            <optgroup label="Car Brands">
                <option>Toyota</option>
                <option>BMW</option>
                <option>Audi</option>
                <option>Mercedes</option>
            </optgroup>

            <optgroup label="Bike Brands">
                <option>Yamaha</option>
                <option>Honda</option>
                <option>KTM</option>
                <option>Royal Enfield</option>
            </optgroup>

        </select><br><br>

        <label>Hobbies:</label>
        <input type="checkbox" id="reading">
        <label for="reading">Reading</label>

        <input type="checkbox" id="coding">
        <label for="coding">Coding</label>
        <br><br>

        <label for="range">Range:</label>
        <input type="range" id="range" min="0" max="100" step="5"><br><br>

        <label for="search">Search:</label>
        <input type="search" id="search"><br><br>

        <label for="tel">Tel:</label>
        <input type="tel" id="tel"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <input type="button" value="Click Me">

    </form>
        </fieldset>
</body>

</html>
