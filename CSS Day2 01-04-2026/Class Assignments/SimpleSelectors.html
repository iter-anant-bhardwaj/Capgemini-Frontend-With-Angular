<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: Arial;
        }
        h2 {
            color: blue;
        }
        .myClass{
            color: green;
        }
        #myId{
            background-color: yellow;
        }
        h3, p{
            color: red;
        }
    </style>
</head>

<body>
    <h2>This is Element Selector (h2)</h2>

    <h1 class="myClass">This is Class Selector</h1>
    <p class="myClass">Another element with same class</p>

    <div id="myId">This is ID Selector</div>

    <h3>This is Group Selector (h3)</h3>
    <p>This paragraph is also affected by Group Selector</p>

</body>

</html>
