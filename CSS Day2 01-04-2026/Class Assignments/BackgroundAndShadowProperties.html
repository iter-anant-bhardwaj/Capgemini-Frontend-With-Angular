<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        #image {
            border: 2px solid;
            width: 300px;

            background-image: url("download.jpg");
            background-repeat: no-repeat;
            background-position: center;

    <div id="image">

    </div><br><br>
    <div id="shadow">
