<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cdnjs Navbar</title>

  <!-- Google Font (closer to cdnjs look) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #1f1f1f;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #2b2b2b;
      padding: 0 40px;
      height: 64px;
      border-bottom: 1px solid #3a3a3a;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    /* LOGO */
    .logo {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
      cursor: pointer;
    }

    .logo .bracket { 
      color: #aaa; 
    }

    .logo .cdn { 
      color: #ff6d00;
    }

    .logo .js { 
      color: #ffffff; 
    }

    /* SOCIAL ICONS */
    .social-icons {
      display: flex;
      gap: 14px;
    }

    .social-icons img {
      width: 18px;
      height: 18px;
      opacity: 0.7;
      transition: 0.2s;
    }

    .social-icons img:hover {
      opacity: 1;
      transform: scale(1.15);
    }

    /* RIGHT SIDE */
    .nav-links {
      list-style: none;
      display: flex;
      gap: 26px;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      text-decoration: none;
      color: #e4e4e4;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
    }

    .nav-links li a:hover {
      color: #ffffff;
    }

    /* STATUS */
    .status-link {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background-color: #2ecc71;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      
      <div class="logo">
        <span class="bracket">&lt;</span><span class="cdn">cdn</span><span class="js">js</span><span class="bracket">&gt;</span>
      </div>

      <div class="social-icons">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png" alt="GitHub">
      </div>

    </div>

    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Libraries</a></li>
      <li><a href="#">API</a></li>
      <li><a href="#">GitHub</a></li>
      <li>
        <a href="#" class="status-link">
          Status <span class="status-dot"></span>
        </a>
      </li>
    </ul>
  </nav>

</body>
</html>
